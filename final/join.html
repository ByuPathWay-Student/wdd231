<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Club of Utah | Join</title>

    <link rel="icon" href="images/art-club-of-utah.ico">

    <meta name="author" content="Adeline Scott">
    <meta name="description"
        content="WDD 231: Web Frontend Development | Individual Website Project | Art Club of Utah | Join">

    <meta property="og:title" content="Art Club of Utah">
    <meta property="og:description"
        content="WDD 231: Web Frontend Development | Individual Website Project | The Join page for the Art club of Utah.">
    <meta property="og:image" content="https://byupathway-student.github.io/wdd231/final/images/colored-pencils.jpg">
    <meta property="og:url" content="https://byupathway-student.github.io/wdd231/final/join.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/large.css">

    <script src="scripts/art-club.js" defer></script>
</head>

<body>
    <header>
        <div class="head-container">
            <img src="images/brush-fill.svg" alt="An icon of a paintbrush.">
            <span>Art Club of Utah</span>

            <button id="ham-button" aria-label="Menu"></button>
        </div>
        <nav id="navi">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li class="current"><a href="join.html">Join</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Join</h1>
        <div class="joinMain">
            <p class="req"> * indicates required</p>

            <form method="get" action="thanks.html" id="joinForm">

                <div class="firstN">
                    <label for="firstName">First Name<span class="colorChange">*</span></label>
                    <input type="text" id="firstName" name="first" autocomplete="given-name"
                        title="Please enter your first name." required>
                </div>

                <div class="lastN">
                    <label for="lastName">Last Name<span class="colorChange">*</span></label>
                    <input type="text" id="lastName" name="last" autocomplete="family-name"
                        title="Please enter your last name." required>
                </div>

                <div class="emailAddress">
                    <label for="email">Email<span class="colorChange">*</span></label>
                    <input type="email" id="email" name="emailAdd" autocomplete="email"
                        title="Please enter your email address." placeholder="example@email.com" required>
                </div>

                <div class="newsletter">
                    <p>Would you like to subscribe to our newsletter?<span class="colorChange">*</span></p>
                    <div>
                        <label><input type="radio" name="newsl" value="No" required>No</label>
                    </div>
                    <div>
                        <label><input type="radio" name="newsl" value="Yes" required>Yes</label>
                    </div>
                </div>

                <div class="goals">
                    <label for="artGoals">Would you like to share some of your art goals with us? <span
                            class="styleChange">(optional)</span></label>
                    <textarea id="artGoals" name="aGoals" title="Enter what goals you have for art."></textarea>
                </div>

                <button type="submit" class="submitButton">Join the Club!</button>
            </form>
        </div>
    </main>
    <footer>

        <div class="socials">
            <a href="https://www.facebook.com/login/?next=https%3A%2F%2Fwww.facebook.com%2F" target="_blank"><img
                    src="images/facebook.svg" alt="Facebook icon" width="16" height="16"></a>
            <a href="https://x.com/" target="_blank"><img src="images/twitter.svg" alt="Twitter Icon" width="16"
                    height="16"></a>
            <a href="https://www.youtube.com/" target="_blank"><img src="images/youtube.svg" alt="Youtube icon"
                    width="16" height="16"></a>
        </div>

        <p> © <span id="currYear"></span> | Art Club of Utah | Adeline Scott</p>
        <p id="lastMod"></p>
    </footer>
</body>

</html>
